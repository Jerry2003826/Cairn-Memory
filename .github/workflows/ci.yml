name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: |
          sandbox="$(bash scripts/create_sandbox.sh /tmp/cairn-ci-sandbox)"
          cd "$sandbox"
          python -m omni.cli audit secrets
      - run: pytest tests/test_mcp.py::test_mcp_client_acceptance_harness_calls_all_read_tools -q
